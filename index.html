<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla X AI - 核心动态追踪</title>
    <style>
        body {
            background-color: #121212; /* 深色科技风背景 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
            background-color: #000000;
            border-bottom: 1px solid #333;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: #aaaaaa;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }
        .btn {
            background-color: #2AABEE; /* Telegram 官方蓝 */
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: opacity 0.3s;
            display: inline-block;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .content {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .feed-container {
            background-color: #ffffff; /* 为了兼容 TG 挂件的底色 */
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tesla X AI</h1>
        <p class="subtitle">追踪马斯克生态：Tesla、FSD 与 xAI 核心动态。不错过任何一次技术革命与财富信号。</p>
        <a href="https://t.me/Tesla_share" target="_blank" class="btn">✈️ 立即加入 Telegram 频道</a>
    </header>

    <div class="content">
        <h2>📡 频道实时同步</h2>
        <p style="color: #888; margin-bottom: 20px;">最新资讯与深度分析：</p>
        
        <div class="feed-container">
            <iframe src="https://t.me/s/Tesla_share" width="100%" height="600" frameborder="0" scrolling="auto"></iframe>
        </div>
    </div>

    <footer>
        © 2026 Tesla X AI. 构建于 GitHub.
    </footer>

</body>
</html>
