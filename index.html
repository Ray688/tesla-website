<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla X AI | 专业的马斯克生态与AI研究站</title>
    <style>
        /* 借鉴律动的深色模式配色 */
        :root {
            --bg-color: #000000;
            --card-bg: #0a0a0a;
            --border-color: #1a1a1a;
            --accent-color: #2AABEE; /* 保持 TG 蓝作为点缀 */
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部导航条 - 借鉴律动简洁风 */
        nav {
            width: 100%;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-content {
            width: 1200px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }

        /* 主体内容区 - 借鉴律动的三栏/双栏感 */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 300px 1fr; /* 左边侧栏，右边主内容 */
            gap: 20px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 左侧：个人/频道名片 & 标签 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: #111;
            border: 1px solid #333;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin: 5px;
            border-radius: 2px;
        }

        /* 右侧：主资讯流 */
        .main-feed {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            min-height: 800px;
        }

        .feed-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff3b3b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 隐藏滚动条但保留功能 */
        iframe {
            width: 100%;
            height: 900px;
            border: none;
        }

        /* 响应式调整 */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <div class="logo">TESLA X AI</div>
            <div style="font-size: 0.9rem; color: var(--text-dim);">专业资讯 · 深度研究</div>
        </div>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="profile-card">
                <h3 style="margin-top: 0;">关于我们</h3>
                <p style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.6;">
                    由 Nexus Hub 团队运营，专注追踪 Elon Musk 生态动态。涵盖 Tesla 财报、FSD 技术演进、xAI 大模型及 SpaceX 核心资讯。
                </p>
                <div style="margin-top: 20px;">
                    <span class="tag">#FSDv12</span>
                    <span class="tag">#Grok</span>
                    <span class="tag">#Optimus</span>
                    <span class="tag">#Macro</span>
                </div>
                <a href="https://t.me/Tesla_share" target="_blank" style="display: block; margin-top: 30px; text-align: center; background: #fff; color: #000; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 2px;">
                    订阅 Telegram 频道
                </a>
            </div>
            
            <div class="profile-card" style="font-size: 0.8rem; color: #444;">
                MARKET STATUS: ACTIVE <br>
                SESSION: 2026.03.29
            </div>
        </div>

        <div class="main-feed">
            <div class="feed-header">
                <div class="live-dot"></div>
                <span style="font-weight: bold; letter-spacing: 1px;">实时快讯 / LIVE FEED</span>
            </div>
            <iframe src="https://t.me/s/Tesla_share" scrolling="yes"></iframe>
        </div>
    </div>

    <footer style="padding: 40px; color: #333; font-size: 0.7rem;">
        DESIGN INSPIRED BY BLOCKBEATS // BUILT BY NEXUS HUB
    </footer>

</body>
</html>
