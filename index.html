<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla X AI - Pro Terminal</title>
    <style>
        /* 核心：暗黑背景 + 极简线条 */
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace; /* 使用等宽字体，更有终端感 */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 方案二的灵魂：行情走马灯 --- */
        .ticker-bar {
            width: 100%;
            background-color: #111;
            border-bottom: 1px solid #222;
            overflow: hidden;
            white-space: nowrap;
            padding: 10px 0;
        }
        .ticker-content {
            display: inline-block;
            animation: scroll-ticker 40s linear infinite; /* 调慢了速度，更显稳重 */
        }
        .ticker-content:hover {
            animation-play-state: paused; /* 鼠标放上去暂停，方便细看 */
        }
        .ticker-item {
            display: inline-block;
            margin: 0 40px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .symbol { color: #888; font-weight: bold; margin-right: 8px; }
        .price { color: #fff; margin-right: 8px; }
        .up { color: #00ff88; } /* 科技绿 */
        .down { color: #ff3b3b; } /* 警示红 */

        @keyframes scroll-ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* 循环滚动技巧 */
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }
        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            color: #fff;
        }
        .divider {
            width: 50px;
            height: 2px;
            background: #2AABEE;
            margin: 20px auto;
        }

        .content {
            width: 95%;
            max-width: 1000px;
            background: #111;
            border: 1px solid #222;
            border-radius: 4px; /* 终端风通常用小圆角或直角 */
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }

        iframe {
            border: none;
            /* 保持 TG 原生色调，不做滤镜，模拟多窗口查看感 */
        }

        footer {
            padding: 40px;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <div class="ticker-content">
            <span class="ticker-item"><span class="symbol">TSLA</span><span class="price">175.22</span><span class="up">▲ 2.1%</span></span>
            <span class="ticker-item"><span class="symbol">BTC</span><span class="price">68,412</span><span class="up">▲ 1.5%</span></span>
            <span class="ticker-item"><span class="symbol">VIX</span><span class="price">14.10</span><span class="down">▼ 0.8%</span></span>
            <span class="ticker-item"><span class="symbol">LMND</span><span class="price">16.85</span><span class="up">▲ 0.4%</span></span>
            <span class="ticker-item"><span class="symbol">PENDLE</span><span class="price">6.25</span><span class="up">▲ 5.2%</span></span>
            <span class="ticker-item"><span class="symbol">ENA</span><span class="price">1.12</span><span class="down">▼ 1.2%</span></span>
            <span class="ticker-item"><span class="symbol">TSLA</span><span class="price">175.22</span><span class="up">▲ 2.1%</span></span>
            <span class="ticker-item"><span class="symbol">BTC</span><span class="price">68,412</span><span class="up">▲ 1.5%</span></span>
            <span class="ticker-item"><span class="symbol">VIX</span><span class="price">14.10</span><span class="down">▼ 0.8%</span></span>
        </div>
    </div>

    <header>
        <h1>Tesla X AI Terminal</h1>
        <div class="divider"></div>
        <p style="color: #666; font-size: 0.9rem;">Intelligence Feed for Tesla, FSD & xAI</p>
    </header>

    <div class="content">
        <iframe src="https://t.me/s/Tesla_share" width="100%" height="800" frameborder="0"></iframe>
    </div>

    <footer>
        Terminal Session: 2026.03.29 // Ray688
    </footer>

</body>
</html>
