<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS · 马斯克宇宙情报站</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=JetBrains+Mono:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #02040a;
  --bg2:     #060c18;
  --bg3:     #0a1428;
  --panel:   rgba(10,20,40,0.9);
  --border:  rgba(0,180,255,0.12);
  --borderB: rgba(0,180,255,0.4);
  --cyan:    #00b4ff;
  --cyanD:   rgba(0,180,255,0.5);
  --orange:  #ff6a00;
  --green:   #00e676;
  --red:     #ff1744;
  --white:   #ddeeff;
  --muted:   rgba(180,210,240,0.4);
  --mono:    'JetBrains Mono', monospace;
  --display: 'Orbitron', monospace;
  --body:    'Noto Sans SC', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--body);
  font-weight: 300;
  overflow-x: hidden;
  cursor: default;
  min-height: 100vh;
}

/* ── SCANLINES ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events:none; z-index:9000;
}

/* ── GRID BG ── */
.grid-bg {
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,180,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events:none; z-index:0;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
.topbar {
  position: fixed; top:0; left:0; right:0; height:52px;
  background: rgba(2,4,10,0.96);
  border-bottom: 1px solid var(--border);
  display: flex; align-items:center; justify-content:space-between;
  padding: 0 28px;
  z-index: 1000;
  backdrop-filter: blur(24px);
}

.logo {
  font-family: var(--display);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 8px;
  color: var(--cyan);
  text-shadow: 0 0 24px rgba(0,180,255,0.7);
  text-decoration: none;
}

.nav {
  display: flex; gap: 2px;
}

.nav-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 6px 14px;
  color: var(--muted);
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.nav-btn:hover, .nav-btn.active {
  color: var(--cyan);
  border-color: var(--border);
  background: rgba(0,180,255,0.05);
}

.topbar-right {
  display: flex; align-items:center; gap:20px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.live-badge {
  display: flex; align-items:center; gap:6px;
  color: var(--green);
  letter-spacing: 2px;
}

.live-badge::before {
  content:'';
  width:6px; height:6px;
  border-radius:50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ══════════════════════════════════════
   TICKER
══════════════════════════════════════ */
.ticker-wrap {
  position:fixed; top:52px; left:0; right:0;
  height:32px;
  background: rgba(0,180,255,0.04);
  border-bottom: 1px solid var(--border);
  overflow:hidden;
  z-index:999;
  display:flex; align-items:center;
}

.ticker-track {
  display:flex; align-items:center; gap:48px;
  animation: tickerMove 40s linear infinite;
  width: max-content;
  padding-left: 100%;
}

@keyframes tickerMove { to { transform: translateX(-50%); } }

.t-item {
  display:flex; align-items:center; gap:8px;
  font-family: var(--mono);
  font-size: 10px;
  white-space: nowrap;
  color: var(--muted);
}

.t-sym { color: var(--cyan); font-weight:700; letter-spacing:1px; }
.t-price { color: var(--white); }
.t-up   { color: var(--green); }
.t-dn   { color: var(--red); }
.t-sep  { color: var(--border); font-size:14px; }
.t-label { color: var(--cyanD); }

/* ══════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════ */
.main {
  padding-top: 84px;
  min-height: 100vh;
  position: relative; z-index:10;
}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero {
  position:relative;
  padding: 60px 40px 40px;
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:32px;
  border-bottom: 1px solid var(--border);
  overflow:hidden;
}

.hero::before {
  content:'';
  position:absolute;
  top:-60px; right:-60px;
  width:500px; height:500px;
  background: radial-gradient(circle, rgba(0,180,255,0.06) 0%, transparent 70%);
  pointer-events:none;
}

.hero-left {}

.hero-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 12px;
  display:flex; align-items:center; gap:10px;
}

.hero-eyebrow::before {
  content:'';
  width:24px; height:1px;
  background: var(--cyan);
}

.hero-title {
  font-family: var(--display);
  font-weight: 900;
  font-size: clamp(28px, 4vw, 52px);
  letter-spacing: 2px;
  line-height: 1.05;
  color: var(--white);
  text-shadow: 0 0 40px rgba(0,180,255,0.2);
}

.hero-title em {
  font-style:normal;
  color: var(--cyan);
  text-shadow: 0 0 30px rgba(0,180,255,0.8);
}

.hero-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 3px;
  margin-top: 16px;
}

.hero-stats {
  display:flex; gap:1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.hero-stat {
  background: var(--bg2);
  padding: 20px 28px;
  min-width: 140px;
  position:relative;
}

.hero-stat::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:2px;
  background: var(--accent, var(--cyan));
  opacity:0.6;
}

.hs-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight:700;
  color: var(--accent, var(--cyan));
  line-height:1;
}

.hs-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 6px;
  text-transform:uppercase;
}

.hs-change {
  font-family: var(--mono);
  font-size: 10px;
  margin-top: 4px;
}

/* ══════════════════════════════════════
   BODY LAYOUT
══════════════════════════════════════ */
.body-layout {
  display:grid;
  grid-template-columns: 1fr 320px;
  gap:0;
  border-top: 1px solid var(--border);
}

/* ── FEED COLUMN ── */
.feed-col {
  border-right: 1px solid var(--border);
  min-height: 80vh;
}

.feed-header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:84px;
  background: rgba(2,4,10,0.95);
  backdrop-filter: blur(12px);
  z-index:50;
}

.feed-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform:uppercase;
}

.filter-tabs {
  display:flex; gap:4px;
}

.filter-btn {
  font-family: var(--mono);
  font-size: 9px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  background:none;
  color: var(--muted);
  cursor:pointer;
  letter-spacing:1px;
  transition: all 0.2s;
}

.filter-btn:hover, .filter-btn.active {
  color: var(--cyan);
  border-color: var(--borderB);
  background: rgba(0,180,255,0.05);
}

/* ── NEWS ITEMS ── */
.news-item {
  display:grid;
  grid-template-columns: 80px 1fr;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
  cursor:pointer;
  animation: fadeIn 0.4s ease both;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.news-item:hover {
  background: rgba(0,180,255,0.03);
}

.news-time-col {
  padding: 20px 16px;
  border-right: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.news-date {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing:1px;
}

.news-time {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--cyan);
  font-weight:700;
}

.news-cat-dot {
  width:6px; height:6px;
  border-radius:50%;
  margin-top:4px;
  flex-shrink:0;
}

.news-content-col {
  padding: 20px 24px;
}

.news-meta {
  display:flex; align-items:center; gap:10px;
  margin-bottom: 8px;
}

.news-entity {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--entity-color, var(--cyan));
  text-transform:uppercase;
  padding: 2px 6px;
  border: 1px solid var(--entity-color, var(--cyan));
  opacity:0.8;
}

.news-category {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  letter-spacing:1px;
}

.news-source {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  margin-left:auto;
}

.news-headline {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--white);
  margin-bottom: 8px;
}

.news-body {
  font-size: 12px;
  line-height: 1.7;
  color: var(--muted);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.news-yt {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:10px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--orange);
  letter-spacing:1px;
  text-decoration:none;
  border: 1px solid rgba(255,106,0,0.3);
  padding: 3px 8px;
  transition: all 0.2s;
}

.news-yt:hover {
  background: rgba(255,106,0,0.08);
  border-color: var(--orange);
}

.news-link {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:10px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--cyanD);
  letter-spacing:1px;
  text-decoration:none;
  transition: color 0.2s;
}

.news-link:hover { color: var(--cyan); }

/* ── COVER IMAGE ── */
.news-cover {
  width:100%; max-height:160px;
  object-fit:cover;
  margin-bottom:10px;
  opacity:0.85;
  border: 1px solid var(--border);
}

/* ── EMPTY / LOADING ── */
.feed-loading, .feed-empty {
  padding: 60px 28px;
  text-align:center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing:2px;
}

.spinner {
  width:24px; height:24px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius:50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to{transform:rotate(360deg)} }

/* ── LOAD MORE ── */
.load-more {
  padding: 24px;
  text-align:center;
  border-top: 1px solid var(--border);
}

.load-more-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--cyan);
  background:none;
  border: 1px solid var(--border);
  padding: 10px 28px;
  cursor:pointer;
  transition: all 0.2s;
  text-transform:uppercase;
}

.load-more-btn:hover {
  background: rgba(0,180,255,0.05);
  border-color: var(--borderB);
}

/* ── RIGHT SIDEBAR ── */
.sidebar {
  background: var(--bg2);
}

.sidebar-section {
  border-bottom: 1px solid var(--border);
  padding: 20px;
}

.sidebar-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform:uppercase;
  margin-bottom: 16px;
  display:flex; align-items:center; justify-content:space-between;
}

.sidebar-update {
  font-size:8px;
  color: var(--muted);
  letter-spacing:1px;
}

/* Stock rows */
.stock-row {
  display:flex; justify-content:space-between; align-items:center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,180,255,0.06);
}

.stock-row:last-child { border-bottom:none; }

.stock-sym {
  font-family: var(--mono);
  font-size: 11px;
  font-weight:700;
  color: var(--white);
  letter-spacing:1px;
}

.stock-name {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted);
  letter-spacing:1px;
  margin-top:2px;
}

.stock-price {
  font-family: var(--mono);
  font-size: 13px;
  font-weight:700;
  color: var(--white);
  text-align:right;
}

.stock-change {
  font-family: var(--mono);
  font-size: 10px;
  text-align:right;
  margin-top:2px;
}

.up   { color: var(--green); }
.dn   { color: var(--red); }

/* Crypto rows */
.crypto-row {
  display:flex; justify-content:space-between; align-items:center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,180,255,0.06);
}

.crypto-row:last-child { border-bottom:none; }

/* Launch items */
.launch-item {
  display:grid;
  grid-template-columns: 28px 1fr;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,180,255,0.06);
}

.launch-item:last-child { border-bottom:none; }

.launch-icon { font-size:16px; padding-top:2px; }

.launch-name {
  font-size: 12px;
  color: var(--white);
  line-height:1.4;
  margin-bottom:4px;
}

.launch-when {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--cyan);
  letter-spacing:1px;
}

.launch-status-ok  { color: var(--green); }
.launch-status-fail { color: var(--red); }

/* Updated time */
.updated-row {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  padding: 12px 20px;
  letter-spacing:1px;
  border-bottom: 1px solid var(--border);
  text-align:right;
}

/* ══════════════════════════════════════
   ENTITY COLORS
══════════════════════════════════════ */
.entity-Tesla     { --entity-color: #e31937; }
.entity-SpaceX    { --entity-color: #4fc3f7; }
.entity-xAI       { --entity-color: #ce93d8; }
.entity-Neuralink { --entity-color: #00e676; }
.entity-X         { --entity-color: #aaaaaa; }
.entity-Boring    { --entity-color: #ffb300; }
.entity-宏观      { --entity-color: #ff6a00; }

.dot-Tesla     { background:#e31937; }
.dot-SpaceX    { background:#4fc3f7; }
.dot-xAI       { background:#ce93d8; }
.dot-Neuralink { background:#00e676; }
.dot-X         { background:#aaaaaa; }
.dot-Boring    { background:#ffb300; }
.dot-宏观      { background:#ff6a00; }
.dot-default   { background:var(--cyan); }

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 40px;
  display:flex; justify-content:space-between; align-items:center;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 900px) {
  .body-layout { grid-template-columns: 1fr; }
  .sidebar { display:none; }
  .hero { flex-direction:column; align-items:flex-start; }
  .hero-stats { flex-wrap:wrap; }
  .nav { display:none; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- TOPBAR -->
<header class="topbar">
  <a class="logo" href="#">NEXUS</a>
  <nav class="nav">
    <button class="nav-btn active" data-filter="all">全部</button>
    <button class="nav-btn" data-filter="快讯">快讯</button>
    <button class="nav-btn" data-filter="深度分析">深度</button>
    <button class="nav-btn" data-filter="视频">视频</button>
    <button class="nav-btn" data-filter="Tesla">Tesla</button>
    <button class="nav-btn" data-filter="SpaceX">SpaceX</button>
    <button class="nav-btn" data-filter="xAI">xAI</button>
  </nav>
  <div class="topbar-right">
    <span class="live-badge">LIVE</span>
    <span id="clock">--:--:--</span>
    <span>UTC+8</span>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span class="t-item"><span class="t-label">正在加载行情数据...</span></span>
  </div>
</div>

<main class="main">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">马斯克宇宙 · 实时情报中枢</div>
      <h1 class="hero-title">MUSK<br><em>NEXUS</em></h1>
      <p class="hero-sub">TESLA · SPACEX · XAI · NEURALINK · BORING · X</p>
    </div>
    <div class="hero-stats" id="hero-stats">
      <div class="hero-stat" style="--accent:#e31937">
        <div class="hs-val" id="hs-tsla-price">--</div>
        <div class="hs-label">TSLA</div>
        <div class="hs-change" id="hs-tsla-change">--</div>
      </div>
      <div class="hero-stat" style="--accent:#f7931a">
        <div class="hs-val" id="hs-btc-price">--</div>
        <div class="hs-label">BTC</div>
        <div class="hs-change" id="hs-btc-change">--</div>
      </div>
      <div class="hero-stat" style="--accent:#00e676">
        <div class="hs-val" id="hs-count">--</div>
        <div class="hs-label">今日情报</div>
        <div class="hs-change" id="hs-updated" style="color:var(--muted);font-size:9px">--</div>
      </div>
    </div>
  </section>

  <!-- BODY -->
  <div class="body-layout">

    <!-- FEED -->
    <section class="feed-col">
      <div class="feed-header">
        <div class="feed-title">情报流</div>
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="快讯">快讯</button>
          <button class="filter-btn" data-filter="深度分析">深度</button>
          <button class="filter-btn" data-filter="视频">视频</button>
          <button class="filter-btn" data-filter="Tesla">Tesla</button>
          <button class="filter-btn" data-filter="SpaceX">SpaceX</button>
          <button class="filter-btn" data-filter="xAI">xAI</button>
        </div>
      </div>
      <div id="feed-list">
        <div class="feed-loading">
          <div class="spinner"></div>
          正在加载情报数据...
        </div>
      </div>
      <div class="load-more" id="load-more-wrap" style="display:none">
        <button class="load-more-btn" id="load-more-btn">加载更多</button>
      </div>
    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- TSLA stock -->
      <div class="sidebar-section">
        <div class="sidebar-label">
          行情数据
          <span class="sidebar-update" id="stocks-updated">--</span>
        </div>
        <div id="stocks-list">
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">加载中...</div>
        </div>
      </div>

      <!-- Crypto -->
      <div class="sidebar-section">
        <div class="sidebar-label">加密货币</div>
        <div id="crypto-list">
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">加载中...</div>
        </div>
      </div>

      <!-- SpaceX launches -->
      <div class="sidebar-section">
        <div class="sidebar-label">SpaceX 发射计划</div>
        <div id="launches-list">
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">加载中...</div>
        </div>
      </div>

    </aside>
  </div>

</main>

<footer>
  <span>NEXUS · 马斯克宇宙情报站</span>
  <span id="footer-updated">数据实时更新中...</span>
</footer>

<script>
// ══════════════════════════════════════
// 工具函数
// ══════════════════════════════════════
const $ = id => document.getElementById(id);

function fmtPrice(p, dec=2) {
  if (p==null||p===undefined) return '--';
  if (p >= 1000) return '$' + p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (p >= 1)    return '$' + p.toFixed(dec);
  return '$' + p.toFixed(4);
}

function fmtPct(p) {
  if (p==null) return {text:'--', cls:''};
  const sign = p>=0?'+':'';
  return { text: sign+p.toFixed(2)+'%', cls: p>=0?'up':'dn' };
}

function relTime(ts) {
  if (!ts) return '时间待定';
  const diff = ts - Date.now()/1000;
  const abs = Math.abs(diff);
  const past = diff < 0;
  if (abs < 3600)   return past ? Math.floor(abs/60)+'分钟前' : Math.floor(abs/60)+'分钟后';
  if (abs < 86400)  return past ? Math.floor(abs/3600)+'小时前' : Math.floor(abs/3600)+'小时后';
  if (abs < 86400*30) return past ? Math.floor(abs/86400)+'天前' : Math.floor(abs/86400)+'天后';
  const d = new Date(ts*1000);
  return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function entityClass(e) {
  const map = {Tesla:'Tesla',SpaceX:'SpaceX',xAI:'xAI',Neuralink:'Neuralink',X:'X',Boring:'Boring',宏观:'宏观'};
  return map[e] || '';
}

function dotClass(e) {
  const map = {Tesla:'dot-Tesla',SpaceX:'dot-SpaceX',xAI:'dot-xAI',Neuralink:'dot-xAI',X:'dot-X',Boring:'dot-Boring',宏观:'dot-宏观'};
  return map[e] || 'dot-default';
}

// ══════════════════════════════════════
// 时钟
// ══════════════════════════════════════
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  $('clock').textContent = h+':'+m+':'+s;
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════
// FEED 数据
// ══════════════════════════════════════
let allItems = [];
let displayedCount = 0;
let currentFilter = 'all';
const PAGE_SIZE = 20;

async function loadFeed() {
  try {
    const r = await fetch('/data/feed.json?t='+Date.now(), {cache:'no-store'});
    const d = await r.json();
    allItems = (d.items||[]).sort((a,b) => (b.ts||0)-(a.ts||0));

    // hero stats
    const today = new Date().toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}).replace('/','-');
    const todayStr = (new Date().getMonth()+1).toString().padStart(2,'0') + '-' + new Date().getDate().toString().padStart(2,'0');
    const todayCount = allItems.filter(x => x.date === todayStr).length;
    $('hs-count').textContent = todayCount || allItems.length;
    if (d.updated) {
      $('hs-updated').textContent = d.updated.slice(11,16) + ' 更新';
      $('footer-updated').textContent = '最后更新: ' + d.updated;
    }

    renderFeed(true);
  } catch(e) {
    $('feed-list').innerHTML = '<div class="feed-empty">暂无数据，采集中...</div>';
    console.warn('feed加载失败:', e);
  }
}

function getFiltered() {
  if (currentFilter === 'all') return allItems;
  return allItems.filter(x =>
    x.category === currentFilter ||
    x.entity === currentFilter
  );
}

function renderFeed(reset=false) {
  if (reset) { displayedCount = 0; $('feed-list').innerHTML = ''; }
  const items = getFiltered();
  const slice = items.slice(displayedCount, displayedCount + PAGE_SIZE);

  if (items.length === 0) {
    $('feed-list').innerHTML = '<div class="feed-empty">该分类暂无内容</div>';
    $('load-more-wrap').style.display = 'none';
    return;
  }

  slice.forEach((item, i) => {
    const ec = entityClass(item.entity);
    const dc = dotClass(item.entity);
    const hasYT = item.yt_id && item.yt_id.trim();
    const hasImg = item.cover_img && item.cover_img.trim();
    const hasUrl = item.source_url && item.source_url.trim() && !hasYT;

    const div = document.createElement('div');
    div.className = 'news-item' + (ec ? ' entity-'+ec : '');
    div.style.animationDelay = (i*0.04)+'s';
    div.innerHTML = `
      <div class="news-time-col">
        <div class="news-date">${esc(item.date||'')}</div>
        <div class="news-time">${esc(item.time||'')}</div>
        <div class="news-cat-dot ${dc}"></div>
      </div>
      <div class="news-content-col">
        <div class="news-meta">
          ${item.entity ? `<span class="news-entity">${esc(item.entity)}</span>` : ''}
          <span class="news-category">${esc(item.category||'')}</span>
          ${item.source ? `<span class="news-source">${esc(item.source)}</span>` : ''}
        </div>
        ${hasImg ? `<img class="news-cover" src="${esc(item.cover_img)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="news-headline">${esc(item.title||'')}</div>
        <div class="news-body">${item.body||item.content||''}</div>
        ${hasYT ? `<a class="news-yt" href="https://www.youtube.com/watch?v=${esc(item.yt_id)}" target="_blank" rel="noopener">▶ 观看视频</a>` : ''}
        ${hasUrl ? `<a class="news-link" href="${esc(item.source_url)}" target="_blank" rel="noopener">→ 阅读原文</a>` : ''}
      </div>
    `;
    $('feed-list').appendChild(div);
  });

  displayedCount += slice.length;
  $('load-more-wrap').style.display = displayedCount < items.length ? 'block' : 'none';
}

// 过滤器
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn, .nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderFeed(true);
}

document.querySelectorAll('.filter-btn, .nav-btn').forEach(btn => {
  btn.addEventListener('click', () => setFilter(btn.dataset.filter));
});

$('load-more-btn').addEventListener('click', () => renderFeed(false));

// ══════════════════════════════════════
// STOCKS 数据
// ══════════════════════════════════════
async function loadStocks() {
  try {
    const r = await fetch('/data/stocks.json?t='+Date.now(), {cache:'no-store'});
    const d = await r.json();

    // Ticker
    const tickerItems = [];
    (d.stocks||[]).forEach(s => {
      const p = fmtPct(s.change_pct);
      tickerItems.push(`<span class="t-item"><span class="t-sym">${s.symbol}</span><span class="t-price">${fmtPrice(s.price)}</span><span class="${p.cls}">${p.text}</span></span><span class="t-sep">·</span>`);
    });
    (d.crypto||[]).forEach(c => {
      const p = fmtPct(c.change_pct);
      tickerItems.push(`<span class="t-item"><span class="t-sym">${c.symbol}</span><span class="t-price">${fmtPrice(c.price)}</span><span class="${p.cls}">${p.text}</span></span><span class="t-sep">·</span>`);
    });
    // 无缝滚动复制
    const html = tickerItems.join('') + tickerItems.join('');
    $('ticker-track').innerHTML = html;

    // Hero stats - TSLA
    const tsla = (d.stocks||[]).find(s=>s.symbol==='TSLA');
    if (tsla) {
      $('hs-tsla-price').textContent = fmtPrice(tsla.price);
      const p = fmtPct(tsla.change_pct);
      const el = $('hs-tsla-change');
      el.textContent = p.text;
      el.className = 'hs-change ' + p.cls;
    }

    // Hero stats - BTC
    const btc = (d.crypto||[]).find(c=>c.symbol==='BTC');
    if (btc) {
      $('hs-btc-price').textContent = btc.price >= 1000
        ? '$' + Math.round(btc.price).toLocaleString()
        : fmtPrice(btc.price);
      const p = fmtPct(btc.change_pct);
      const el = $('hs-btc-change');
      el.textContent = p.text;
      el.className = 'hs-change ' + p.cls;
    }

    // Sidebar stocks
    $('stocks-list').innerHTML = (d.stocks||[]).map(s => {
      const p = fmtPct(s.change_pct);
      return `<div class="stock-row">
        <div><div class="stock-sym">${s.symbol}</div><div class="stock-name">${s.name}</div></div>
        <div><div class="stock-price">${fmtPrice(s.price)}</div><div class="stock-change ${p.cls}">${p.text}</div></div>
      </div>`;
    }).join('');

    // Sidebar crypto
    $('crypto-list').innerHTML = (d.crypto||[]).map(c => {
      const p = fmtPct(c.change_pct);
      return `<div class="crypto-row">
        <div><div class="stock-sym">${c.symbol}</div><div class="stock-name">${c.name}</div></div>
        <div><div class="stock-price">${fmtPrice(c.price)}</div><div class="stock-change ${p.cls}">${p.text}</div></div>
      </div>`;
    }).join('');

    if (d.updated) {
      $('stocks-updated').textContent = d.updated.slice(11,16);
    }

  } catch(e) {
    console.warn('stocks加载失败:', e);
  }
}

// ══════════════════════════════════════
// LAUNCHES 数据
// ══════════════════════════════════════
async function loadLaunches() {
  try {
    const r = await fetch('/data/launches.json?t='+Date.now(), {cache:'no-store'});
    const d = await r.json();
    const upcoming = (d.upcoming||[]).slice(0,4);
    const past = (d.past||[]).slice(0,2);

    let html = '';
    upcoming.forEach(lc => {
      html += `<div class="launch-item">
        <div class="launch-icon">🚀</div>
        <div>
          <div class="launch-name">${esc(lc.name)}</div>
          <div class="launch-when">${relTime(lc.date_unix)}</div>
        </div>
      </div>`;
    });
    past.forEach(lc => {
      const icon = lc.success===true?'✅':lc.success===false?'❌':'❓';
      html += `<div class="launch-item">
        <div class="launch-icon">${icon}</div>
        <div>
          <div class="launch-name">${esc(lc.name)}</div>
          <div class="launch-when" style="color:var(--muted)">${relTime(lc.date_unix)}</div>
        </div>
      </div>`;
    });

    $('launches-list').innerHTML = html || '<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">暂无数据</div>';
  } catch(e) {
    console.warn('launches加载失败:', e);
  }
}

// ══════════════════════════════════════
// 启动 & 定时刷新
// ══════════════════════════════════════
loadFeed();
loadStocks();
loadLaunches();

setInterval(loadFeed,   5 * 60 * 1000);   // 5分钟
setInterval(loadStocks, 60 * 1000);        // 60秒
setInterval(loadLaunches, 60 * 60 * 1000); // 1小时
</script>
